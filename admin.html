<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kalitlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fafafa; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; border: 3px solid #d32f2f; }
        .section-title { background: #ffebee; padding: 10px; border-radius: 8px; font-weight: bold; margin: 20px 0; text-align: center; color: #b71c1c; }
        .q-row { padding: 12px 0; border-bottom: 1px solid #eee; }
        .opts { display: flex; gap: 6px; margin-top: 8px; }
        input[type="radio"] { display: none; }
        label { width: 38px; height: 38px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: bold; }
        input:checked + label { background: #d32f2f; color: white; border-color: #d32f2f; }
        
        /* Admin uchun matematik panel */
        .math-toolbar { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 5px; margin-top: 10px; }
        .math-btn { padding: 4px 8px; background: #f1f1f1; border: 1px solid #bbb; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; }
        
        input[type="text"] { padding: 12px; border: 1px solid #ccc; border-radius: 8px; width: 85%; margin-top: 5px; font-size: 16px; }
        button#save-btn { width: 100%; padding: 18px; background: #d32f2f; color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin-top: 30px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#d32f2f">🔑 Admin Panel</h2>
        
        <div class="section-title">TEST KALITLARI (1-35)</div>
        <div id="tk"></div>
        
        <div class="section-title">YOZMA KALITLAR (36-45 A/B)</div>
        <div id="wk"></div>
        
        <button id="save-btn" onclick="save()">KALITLARNI SAQLASH</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Testlar qismini yaratish
        for(let i=1; i<=35; i++){
            let o = ""; 
            ['A','B','C','D','E'].forEach(x => { 
                o += `<input type="radio" name="k${i}" id="k${i}${x}" value="${x}"><label for="k${i}${x}">${x}</label>`; 
            });
            document.getElementById('tk').innerHTML += `<div class="q-row"><b>${i}. Savol</b><div class="opts">${o}</div></div>`;
        }

        // Matematik belgi qo'shish funksiyasi
        function ins(id, v) { 
            const el = document.getElementById(id);
            el.value += v; el.focus();
        }

        // Yozma qismni yaratish (A/B)
        for(let i=36; i<=45; i++){
            document.getElementById('wk').innerHTML += `
                <div class="q-row">
                    <b>${i}-savol kalitlari:</b><br>
                    
                    <div class="math-toolbar">
                        <button class="math-btn" onclick="ins('k${i}a','√')">√</button>
                        <button class="math-btn" onclick="ins('k${i}a','^')">^</button>
                        <button class="math-btn" onclick="ins('k${i}a','/')">/</button>
                        <button class="math-btn" onclick="ins('k${i}a','π')">π</button>
                    </div>
                    A: <input type="text" id="k${i}a" placeholder="Kalit A...">
                    
                    <div class="math-toolbar" style="margin-top:10px">
                        <button class="math-btn" onclick="ins('k${i}b','√')">√</button>
                        <button class="math-btn" onclick="ins('k${i}b','^')">^</button>
                        <button class="math-btn" onclick="ins('k${i}b','/')">/</button>
                        <button class="math-btn" onclick="ins('k${i}b','π')">π</button>
                    </div>
                    B: <input type="text" id="k${i}b" placeholder="Kalit B...">
                </div>`;
        }

        function save() {
            let t = ""; let w = [];
            for(let i=1; i<=35; i++){
                let s = document.querySelector(`input[name="k${i}"]:checked`);
                t += s ? s.value : "X";
            }
            for(let i=36; i<=45; i++){
                let vA = document.getElementById('k'+i+'a').value.trim();
                let vB = document.getElementById('k'+i+'b').value.trim();
                w.push(vA !== "" ? vA : "X");
                w.push(vB !== "" ? vB : "X");
            }
            tg.sendData("SET_KEYS " + t + " " + w.join(","));
            tg.close();
        }
    </script>
</body>
</html>
