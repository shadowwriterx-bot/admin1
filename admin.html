<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Kalitlar</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; background: #fafafa; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; border: 2px solid #d32f2f; }
        .section-title { background: #ffebee; padding: 10px; border-radius: 8px; font-weight: bold; margin: 20px 0; text-align: center; color: #b71c1c; }
        .q-row { padding: 10px 0; border-bottom: 1px solid #eee; }
        .opts { display: flex; gap: 5px; margin-top: 5px; }
        input[type="radio"] { display: none; }
        label { width: 35px; height: 35px; border: 1px solid #ccc; display: flex; align-items: center; justify-content: center; border-radius: 5px; cursor: pointer; font-weight: bold; }
        input:checked + label { background: #d32f2f; color: white; border-color: #d32f2f; }
        input[type="text"] { padding: 10px; border: 1px solid #ccc; border-radius: 5px; width: 85%; margin-top: 5px; }
        button { width: 100%; padding: 15px; background: #d32f2f; color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 18px; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="text-align:center; color:#d32f2f">🔑 Admin Panel</h2>
        <div class="section-title">TEST KALITLARI (1-35)</div>
        <div id="tk"></div>
        <div class="section-title">YOZMA KALITLAR (36-45 A/B)</div>
        <div id="wk"></div>
        <button onclick="save()">KALITLARNI SAQLASH</button>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        for(let i=1; i<=35; i++){
            let o = ""; ['A','B','C','D','E'].forEach(x => { o += `<input type="radio" name="k${i}" id="k${i}${x}" value="${x}"><label for="k${i}${x}">${x}</label>`; });
            document.getElementById('tk').innerHTML += `<div class="q-row"><b>${i}.</b><div class="opts">${o}</div></div>`;
        }
        for(let i=36; i<=45; i++){
            document.getElementById('wk').innerHTML += `
                <div class="q-row">
                    <b>${i}-savol:</b><br>
                    A: <input type="text" id="k${i}a" placeholder="Kalit A..."><br>
                    B: <input type="text" id="k${i}b" placeholder="Kalit B...">
                </div>`;
        }
        function save() {
            let t = ""; let w = [];
            for(let i=1; i<=35; i++){
                let s = document.querySelector(`input[name="k${i}"]:checked`);
                t += s ? s.value : "X";
            }
            for(let i=36; i<=45; i++){
                w.push(document.getElementById('k'+i+'a').value.trim() || "X");
                w.push(document.getElementById('k'+i+'b').value.trim() || "X");
            }
            tg.sendData("SET_KEYS " + t + " " + w.join(","));
            tg.close();
        }
    </script>
</body>
</html>
